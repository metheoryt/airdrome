repos:
  - repo: local
    hooks:
      # Run the linter.
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [ python, pyi ]
        require_serial: true
      # Run the formatter.
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [ python, pyi ]
        require_serial: true
